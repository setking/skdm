name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --no-progress -y
          echo "${Env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update build assets (NSIS metadata)
        run: wails3 task common:update:build-assets

      - name: Package (build + NSIS installer)
        run: task windows:package

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: skdm
          path: bin/skdm.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: skdm-installer
          path: bin/skdm-amd64-installer.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            bin/skdm.exe
            bin/skdm-amd64-installer.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
